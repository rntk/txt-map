<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RSS Submission Analyzer</title>
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    h3 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 16px;
      color: #333;
    }
    .connection-status {
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .connected {
      background: #d4edda;
      color: #155724;
    }
    .disconnected {
      background: #f8d7da;
      color: #721c24;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .connected .status-dot {
      background: #28a745;
    }
    .disconnected .status-dot {
      background: #dc3545;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 13px;
    }
    input:focus {
      outline: none;
      border-color: #4CAF50;
    }
    button {
      width: 100%;
      padding: 10px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }
    #connect {
      background: #4CAF50;
      color: white;
      margin-bottom: 8px;
    }
    #connect:hover {
      background: #45a049;
    }
    #connect:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #disconnect {
      background: #f44336;
      color: white;
    }
    #disconnect:hover {
      background: #da190b;
    }
    #openSettings {
      background: #666;
      color: white;
      margin-bottom: 8px;
    }
    #openSettings:hover {
      background: #555;
    }
    #startSelection {
      background: #2196F3;
      color: white;
      margin-bottom: 8px;
    }
    #startSelection:hover {
      background: #0b7dda;
    }
    .panel {
      display: none;
    }
    .panel.visible {
      display: block;
    }
    .hint {
      font-size: 11px;
      color: #666;
      margin-top: 10px;
      text-align: center;
    }
    .error {
      color: #dc3545;
      font-size: 12px;
      margin-top: 8px;
      padding: 8px;
      background: #f8d7da;
      border-radius: 4px;
      display: none;
    }
    .error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <h3>RSS Submission Analyzer</h3>
  
  <div id="connectionStatus" class="connection-status disconnected">
    <span class="status-dot"></span>
    <span id="statusText">Not connected</span>
  </div>
  
  <div id="loginPanel" class="panel visible">
    <input type="password" id="token" placeholder="API Token" />
    <button id="connect">Connect</button>
    <div id="errorMsg" class="error"></div>
    <div class="hint">
      Get your token from the <br>
      <a href="#" id="openTokensPage">Tokens page</a> in the web UI
    </div>
  </div>
  
  <div id="connectedPanel" class="panel">
    <button id="startSelection" class="primary">Start Selection</button>
    <button id="openSettings">Settings</button>
    <button id="disconnect">Disconnect</button>
  </div>
  
  <script src="config.js"></script>
  <script src="api-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
