services:
  api:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/
      - NLTK_DATA=/app/.nltk_data
      - NLTK_AUTO_DOWNLOAD_ON_STARTUP=1
      - LLAMACPP_URL=${LLAMACPP_URL:-}
      - TOKEN=${TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
    volumes:
      - ./.nltk_data:/app/.nltk_data
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000" ]

  llm_worker:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/
      - NLTK_DATA=/app/.nltk_data
      - NLTK_AUTO_DOWNLOAD_ON_STARTUP=1
      - LLAMACPP_URL=${LLAMACPP_URL:-}
      - TOKEN=${TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - LLM_WORKER_POLL_INTERVAL=${LLM_WORKER_POLL_INTERVAL:-0.5}
      - LLM_WORKER_HEARTBEAT_FILE=/tmp/llm_worker_heartbeat
    volumes:
      - ./.nltk_data:/app/.nltk_data
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "find", "/tmp/llm_worker_heartbeat", "-mmin", "-2"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network
    command: [ "python", "llm_workers.py" ]
    deploy:
      replicas: 2

  worker:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/
      - NLTK_DATA=/app/.nltk_data
      - NLTK_AUTO_DOWNLOAD_ON_STARTUP=1
      - LLAMACPP_URL=${LLAMACPP_URL:-}
      - TOKEN=${TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - WORKER_HEARTBEAT_FILE=/tmp/worker_heartbeat
    volumes:
      - ./.nltk_data:/app/.nltk_data
    depends_on:
      mongodb:
        condition: service_healthy
      api:
        condition: service_healthy
      llm_worker:
        condition: service_started
    healthcheck:
      test: ["CMD", "find", "/tmp/worker_heartbeat", "-mmin", "-2"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network
    command: [ "python", "workers.py" ]
    deploy:
      replicas: 2

  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=rss
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network
  # Optional: LlamaCPP server (if you want to run it locally)
  # Uncomment the section below if you want to include LlamaCPP server
  # llamacpp:
  #   image: ghcr.io/ggerganov/llama.cpp:server
  #   ports:
  #     - "8989:8080"
  #   volumes:
  #     - ./models:/models
  #   command: ["--model", "/models/your-model.gguf", "--port", "8080", "--host", "0.0.0.0"]
  #   restart: unless-stopped
  #   networks:
  #     - app-network

volumes:
  mongodb_data:


networks:
  app-network:
    driver: bridge
